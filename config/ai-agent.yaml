  cancel_transfer:
    allow_during_ring: true
    enabled: false
  check_extension_status:
    restrict_to_configured_extensions: true
  default_action_timeout: 30
  enabled: true
  extensions:
    internal:
      '6000':
        action_type: transfer
        device_state_tech: auto
        aliases:
          - agent
          - representative
          - human
          - real person
          - live person
          - someone
          - support
          - sales
          - operator
          - help desk
        description: Live customer service representative
        dial_string: SIP/6000
        mode: warm
        name: Live Agent
        timeout: 30
        transfer: true
  hangup_call:
    enabled: true
    farewell_message: Thank you for calling. Goodbye!
    require_confirmation: false
    policy:
      mode: normal
      enforce_transcript_offer: false
      block_during_contact_capture: true
      markers:
        end_call:
          - no transcript
          - no transcript needed
          - don't send a transcript
          - do not send a transcript
          - no need for a transcript
          - no thanks
          - no thank you
          - that's all
          - that is all
          - that's it
          - that is it
          - nothing else
          - all set
          - all good
          - end the call
          - end call
          - hang up
          - hangup
          - goodbye
          - bye
        assistant_farewell:
          - goodbye
          - bye
          - thank you for calling
          - thanks for calling
          - have a great day
          - have a good day
          - take care
          - ending the call
          - i'll let you go
        affirmative:
          - yes
          - yeah
          - yep
          - correct
          - that's correct
          - thats correct
          - that's right
          - thats right
          - right
          - exactly
          - affirmative
        negative:
          - no
          - nope
          - nah
          - negative
          - don't
          - dont
          - do not
          - not
          - not needed
          - no need
          - no thanks
          - no thank you
          - decline
          - skip
  leave_voicemail:
    enabled: false
    extension: '2765'
  request_transcript:
    admin_email: ''
    api_key: ${REQUEST_TRANSCRIPT_API_KEY:-}
    common_domains:
      - gmail.com
      - yahoo.com
      - outlook.com
      - hotmail.com
      - icloud.com
    confirm_email: true
    enabled: false
    from_email: ${REQUEST_TRANSCRIPT_FROM_EMAIL:-noreply@example.com}
    from_name: ${REQUEST_TRANSCRIPT_FROM_NAME:-Asterisk AI Voice Agent}
    max_attempts: 2
    provider: ${REQUEST_TRANSCRIPT_PROVIDER:-resend}
    validate_domain: false
  send_email_summary:
    admin_email: ${SEND_EMAIL_ADMIN:-}
    api_key: ${SEND_EMAIL_API_KEY:-}
    enabled: false
    from_email: ${SEND_EMAIL_FROM:-noreply@example.com}
    from_name: ${SEND_EMAIL_FROM_NAME:-Asterisk AI Voice Agent}
    include_metadata: true
    include_transcript: true
    provider: ${SEND_EMAIL_PROVIDER:-resend}
  transfer:
    defer_until_playback_complete: true
    deferred_strategy: drain_then_dial
    predial_bridge_wait_timeout_sec: 10
    predial_timeout_seconds: 30
    predial_wait_moh_class: default
    extension_context: from-internal
    queue_context: ext-queues
    ringgroup_context: ext-group
    technology: PJSIP
    destinations:
      sales_agent:
        description: Sales agent
        dialplan_context: from-internal
        target: '2765'
        type: extension
        live_agent: false
      sales_queue: null
      sales_team: null
      support_agent: null
      support_queue: null
      support_team: null
    enabled: false
  google_calendar:
    enabled: false
mcp:
  enabled: false
  servers:
    weather:
      transport: stdio
      command:
        - python3
        - '-m'
        - src.mcp_servers.weather_mcp_server
      defaults:
        timeout_ms: 15000
        slow_response_threshold_ms: 3000
        slow_response_message: Let me check the weather for you, one moment...
      tools:
        - name: get_weather_by_city
          expose_as: mcp_weather_get_city
          speech_field: spoken
    aviation_atis:
      transport: stdio
      command:
        - python3
        - '-m'
        - src.mcp_servers.aviation_atis_server
        - '--config'
        - /app/config/aviation_atis.yaml
      env:
        METNO_USER_AGENT: >-
          Asterisk-AI-Voice-Agent
          (+https://github.com/hkjarral/AVA-AI-Voice-Agent-for-Asterisk)
      defaults:
        timeout_ms: 15000
        slow_response_threshold_ms: 3000
        slow_response_message: Let me get the current ATIS for you, one moment...
      tools:
        - name: get_atis
          expose_as: mcp_aviation_atis
          description: Get current ATIS for an ICAO airport code (e.g., LSMP, KJFK)
          speech_field: atis_text
# Provider-independent caller inactivity policy. Timing starts only while the
# agent is ready and neither speaking nor processing a caller turn.
no_input:
  enabled: true
  inbound_enabled: true
  outbound_enabled: false
  initial_timeout_sec: 30
  grace_timeout_sec: 15
  max_check_ins: 1
  check_in_message: "Are you still there?"
  final_message: "I still can't hear you, so I'll end the call now. Goodbye."
vad:
  enhanced_enabled: true
  fallback_buffer_size: 128000
  fallback_enabled: true
  fallback_interval_ms: 4000
  max_utterance_duration_ms: 10000
  min_utterance_duration_ms: 600
  use_provider_vad: false
  utterance_padding_ms: 200
  webrtc_aggressiveness: 1
  webrtc_end_silence_frames: 50
  webrtc_start_frames: 3
